services:
  # The Librarian: Stores and chats with your family archives
  anythingllm:
    image: mintplexlabs/anythingllm
    container_name: anythingllm
    ports:
      - "3001:3001"
    environment:
      - STORAGE_DIR=/app/server/storage
    volumes:
      - ./anythingllm_storage:/app/server/storage
    networks:
      - legacy-net
    restart: always

  # The Engineer: Automates your Titan statements and AP workflows
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: always
    ports:
      - "5678:5678"
      - "5679:5679"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_SECURE_COOKIE=false
      - N8N_RUNNERS_AUTH_TOKEN=legacy_bridge_secret_2026
      - N8N_RUNNERS_BROKER_LISTEN_ADDRESS=0.0.0.0
      - N8N_RUNNERS_ENABLED=true
      - NODE_FUNCTION_ALLOW_BUILTIN=fs,path
      # Added: Increases node/workflow timeout logic across n8n
      - EXECUTIONS_TIMEOUT=3600
      - EXECUTIONS_TIMEOUT_MAX=7200
      - N8N_DEFAULT_RAW_DATA_TIMEOUT=1800000
    volumes:
      - n8n_data:/home/node/.n8n
      - /mnt/ssd1/inv_memo:/mnt/ssd1/inv_memo
    networks:
      - legacy-net

  # The Specialist: The Python engine that processes your legacy data
  n8n-python-runner:
    build: .
    container_name: n8n-python-runner
    runtime: nvidia
    restart: always
    environment:
      - N8N_RUNNERS_AUTH_TOKEN=legacy_bridge_secret_2026
      - N8N_RUNNERS_TASK_BROKER_URI=http://n8n:5679
      - N8N_RUNNERS_LAUNCHER=python
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - legacy-net
    depends_on:
      - n8n
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, utility]

  # The Brain: Runs local LLMs for 100% privacy
  ollama:
    image: ollama/ollama
    container_name: ollama
    runtime: nvidia
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_storage:/root/.ollama
    networks:
      - legacy-net
    restart: always
    environment:
      - OLLAMA_NUM_GPU=2
      # Added: Keep models loaded in memory for much longer to avoid TTFT offloading
      - OLLAMA_KEEP_ALIVE=24h
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # The Interface: Open WebUI for direct Ollama access
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "3000:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - ./open-webui_storage:/app/backend/data
    networks:
      - legacy-net
    restart: always
    depends_on:
      - ollama

# GLOBAL DEFINITIONS (Must be flush left)
volumes:
  n8n_data:

networks:
  legacy-net:
    driver: bridge